<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#071126"/>
      <stop offset="0.48" stop-color="#15357A"/>
      <stop offset="1" stop-color="#091227"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#C6F3FF"/>
      <stop offset="0.48" stop-color="#75BFFF"/>
      <stop offset="1" stop-color="#2A58C9"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0D214E" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#071633" stop-opacity="0.92"/>
    </linearGradient>
    <radialGradient id="orbCyan" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(270 180) rotate(90) scale(220 280)">
      <stop stop-color="#66F0FF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#66F0FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbPink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1300 160) rotate(90) scale(180 220)">
      <stop stop-color="#FF8CDA" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#FF8CDA" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbGreen" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1120 730) rotate(90) scale(160 250)">
      <stop stop-color="#9AFFC8" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#9AFFC8" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="6" height="6">
      <rect width="6" height="1" fill="white" fill-opacity="0.06"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#orbCyan)"/>
  <rect width="1600" height="900" fill="url(#orbPink)"/>
  <rect width="1600" height="900" fill="url(#orbGreen)"/>
  <rect width="1600" height="900" fill="url(#scanlines)" opacity="0.34"/>

  <g opacity="0.85">
    <circle cx="150" cy="90" r="3" fill="#9AFFF5"/>
    <circle cx="248" cy="132" r="2" fill="#FFF59A"/>
    <circle cx="1370" cy="92" r="3" fill="#9AFFF5"/>
    <circle cx="1264" cy="186" r="2" fill="#FFD6F6"/>
    <circle cx="1102" cy="788" r="3" fill="#9AFFF5"/>
  </g>

  <g transform="translate(92 64)">
    <rect x="0" y="0" width="1416" height="66" rx="2" fill="url(#bar)"/>
    <text x="26" y="43" fill="#07162B" font-family="Verdana, Arial, sans-serif" font-size="28" font-weight="700">RelayCore // Local Control Plane</text>
    <text x="1268" y="43" fill="#07162B" font-family="Verdana, Arial, sans-serif" font-size="24" font-weight="700">_  □  X</text>
  </g>

  <g transform="translate(92 152)">
    <rect x="0" y="0" width="924" height="330" fill="url(#panel)" stroke="#6FDFFF" stroke-opacity="0.45"/>
    <rect x="0" y="0" width="924" height="48" fill="url(#bar)"/>
    <text x="18" y="31" fill="#06152A" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700">relaycore_boot.exe</text>
    <text x="664" y="31" fill="#06152A" font-family="Verdana, Arial, sans-serif" font-size="22" font-weight="700">runtime://synchronized</text>
    <text x="32" y="106" fill="#71E9FF" font-family="Arial Black, Arial, sans-serif" font-size="72" letter-spacing="2">RELAYCORE</text>
    <text x="34" y="154" fill="#A1F4FF" font-family="Verdana, Arial, sans-serif" font-size="22">compact multi-agent operations for local control</text>
    <text x="34" y="210" fill="#D7F5FF" font-family="Verdana, Arial, sans-serif" font-size="26">100 agents / machine</text>
    <text x="34" y="246" fill="#D7F5FF" font-family="Verdana, Arial, sans-serif" font-size="26">50 providers planned</text>
    <text x="34" y="282" fill="#D7F5FF" font-family="Verdana, Arial, sans-serif" font-size="26">token conservative // PicoClaw parity // broad toolchain support</text>
  </g>
</svg>
